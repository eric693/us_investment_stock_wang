<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>績優股清單（財報狗選股法）</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--text); }

.bc-nav {
  display: flex; align-items: center; gap: 4px;
  padding: 0 20px; height: 54px;
  background: var(--card-bg); border-bottom: 1px solid var(--card-bd);
  position: sticky; top: 0; z-index: 50; overflow-x: auto;
}
.bc-nav .brand { font-size: 1.05rem; font-weight: 900; margin-right: 18px; white-space: nowrap; }
.bc-nav .brand span { color: var(--gold); }
.bc-nav a { color: var(--text-mid); text-decoration: none; font-size: 0.82rem; white-space: nowrap;
  font-weight: 700; padding: 6px 12px; border-radius: 6px; transition: all .15s; }
.bc-nav a:hover { color: var(--text); background: #0d1628; }
.bc-nav a.active { color: #fff; background: var(--accent); }
.bc-nav a.home { background: linear-gradient(135deg, #1a6fd4, #7c4dff); color: #fff; }

.bc-wrap { max-width: 1080px; margin: 0 auto; padding: 22px 20px; }
.bc-title { font-size: 1.3rem; font-weight: 900; margin: 0 0 4px; }
.bc-sub { font-size: 0.82rem; color: var(--text-dim); margin-bottom: 18px; line-height: 1.6; }

.bc-form {
  display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;
  background: var(--card-bg); border: 1px solid var(--card-bd);
  border-radius: 10px; padding: 16px; margin-bottom: 16px;
}
.bc-field { display: flex; flex-direction: column; gap: 5px; }
.bc-field label { font-size: 0.68rem; color: var(--text-dim); font-weight: 700; }
.bc-select {
  background: #0a1120; border: 1px solid var(--card-bd); border-radius: 7px;
  color: var(--text); padding: 9px 12px; font-size: 0.84rem; outline: none; min-width: 150px;
}
.bc-select:focus { border-color: var(--accent); }
.bc-btn { background: var(--accent); color: #fff; border: none; border-radius: 7px;
  padding: 10px 24px; font-size: 0.85rem; font-weight: 800; cursor: pointer; }
.bc-btn:hover { opacity: .9; } .bc-btn:disabled { opacity: .4; cursor: default; }

.bc-note { font-size: 0.72rem; color: var(--text-dim); margin: 4px 0 14px; line-height: 1.6; }
.bc-progress { display: none; margin: 12px 0; }
.bc-progbar { position: relative; height: 8px; border-radius: 8px; background: #0d1628; overflow: hidden; }
.bc-progbar > div { position: absolute; height: 8px; border-radius: 8px; background: var(--accent); width: 0; transition: width .3s; }

.bc-table { width: 100%; border-collapse: collapse; font-size: 0.82rem;
  background: var(--card-bg); border: 1px solid var(--card-bd); border-radius: 10px; overflow: hidden; }
.bc-table th { text-align: right; padding: 10px 12px; font-size: 0.66rem; font-weight: 800;
  color: var(--text-dim); border-bottom: 1px solid var(--card-bd); background: #08101e; white-space: nowrap; }
.bc-table th:nth-child(2) { text-align: left; }
.bc-table td { padding: 10px 12px; text-align: right; border-bottom: 1px solid #0d1628; }
.bc-table td:nth-child(2) { text-align: left; font-weight: 700; color: var(--text); }
.bc-table tr.click { cursor: pointer; }
.bc-table tr.click:hover td { background: rgba(26,111,212,.08); }
.bc-table tr.top td { background: rgba(255,196,0,.06); }
.bc-rank { display: inline-block; min-width: 22px; text-align: center; font-weight: 900; }
.bc-rank.g { color: var(--gold); }
.bc-detail td { background: #08101e; font-size: 0.76rem; color: var(--text-mid); text-align: left; }
.pos { color: #ff4e4e; } .neg { color: #26d96b; } .muted { color: var(--text-dim); }

.bc-loading { text-align: center; padding: 30px; color: var(--text-dim); font-size: 0.86rem; }
.bc-empty { text-align: center; padding: 30px; color: var(--text-dim); font-size: 0.84rem; }
.bc-meta { font-size: 0.76rem; color: var(--text-mid); margin: 12px 0 6px; }
</style>
</head>
<body>

<nav class="bc-nav">
  <div class="brand">AI<span>投資</span></div>
  <a href="/ai" class="home">智能首頁</a>
  <a href="/tw">台股</a>
  <a href="/screener">篩選器</a>
  <a href="/predict">AI 預測</a>
  <a href="/backtest">策略回測</a>
  <a href="/perpetual">永動機</a>
  <a href="/bluechip" class="active">績優股</a>
</nav>

<div class="bc-wrap">
  <h1 class="bc-title">績優股清單（財報狗選股法）</h1>
  <div class="bc-sub">
    用多因子選出「被低估的績優股」。先剔除自由現金流報酬率三年衰退的公司，再以
    <b>三年平均自由現金流報酬率、本益比、股價淨值比、殖利率</b> 四因子各自排名加總。
    <b>綜合分數越小＝越被低估</b>，排越前面。
  </div>

  <div class="bc-form">
    <div class="bc-field">
      <label>市場</label>
      <select class="bc-select" id="marketSelect">
        <option value="tw" selected>台股</option>
        <option value="us">美股</option>
      </select>
    </div>
    <button class="bc-btn" id="runBtn" onclick="runScan()">執行選股</button>
  </div>
  <div class="bc-note">
    首次跑分需抓三年財報，約 1–3 分鐘；單檔結果快取 6 小時，第二次更快。背景執行，可離開頁面稍後再回來看。
  </div>

  <div class="bc-progress" id="progress">
    <div class="muted" id="progText" style="font-size:.78rem;margin-bottom:6px"></div>
    <div class="bc-progbar"><div id="progFill"></div></div>
  </div>

  <div id="result"><div class="bc-empty">選擇市場後按「執行選股」開始跑分。</div></div>
</div>

<script>
let pollTimer = null;

window.onload = async () => {
  try {
    const st = await (await fetch('/api/bluechip/scan/status')).json();
    if (st.running || (st.finished && st.results && st.results.length)) {
      document.getElementById('marketSelect').value = st.market || 'tw';
      document.getElementById('runBtn').disabled = !!st.running;
      poll();
    }
  } catch(e) {}
};

function f(v, suffix='') { return (v === null || v === undefined) ? '-' : v + suffix; }

async function runScan() {
  const market = document.getElementById('marketSelect').value;
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  document.getElementById('result').innerHTML = '<div class="bc-loading">啟動背景跑分…</div>';
  document.getElementById('progress').style.display = 'block';
  try {
    const r = await fetch('/api/bluechip/scan', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ market }),
    });
    const d = await r.json();
    if (d.error) { document.getElementById('result').innerHTML = `<div class="bc-empty">${d.error}</div>`; btn.disabled = false; return; }
    poll();
  } catch(e) {
    document.getElementById('result').innerHTML = `<div class="bc-empty">啟動失敗：${e.message}</div>`;
    btn.disabled = false;
  }
}

async function poll() {
  if (pollTimer) clearTimeout(pollTimer);
  try {
    const st = await (await fetch('/api/bluechip/scan/status')).json();
    const pct = st.total ? Math.round(st.done / st.total * 100) : 0;
    document.getElementById('progress').style.display = 'block';
    document.getElementById('progText').textContent =
      `${st.running ? '跑分中' : '已完成'} ${st.done}/${st.total}（${pct}%）・入選 ${st.matched} 檔${st.finished ? '・完成於 '+st.finished : ''}`;
    document.getElementById('progFill').style.width = pct + '%';
    renderTable(st);
    if (st.running) {
      pollTimer = setTimeout(poll, 4000);
    } else {
      document.getElementById('runBtn').disabled = false;
      if (!st.results || !st.results.length)
        document.getElementById('result').innerHTML = '<div class="bc-empty">沒有符合條件的績優股（可能財報資料不足或皆遭剔除）。</div>';
    }
  } catch(e) {
    pollTimer = setTimeout(poll, 6000);
  }
}

function renderTable(st) {
  if (!st.results || !st.results.length) { if (st.running) document.getElementById('result').innerHTML = '<div class="bc-loading">跑分中，尚未產出排名…</div>'; return; }
  const mkt = st.market === 'us' ? 'us' : 'tw';
  const rows = st.results.map((x, i) => `
    <tr class="click ${i < 3 ? 'top' : ''}" onclick="toggleDetail(${i})">
      <td><span class="bc-rank ${i < 3 ? 'g' : ''}">${i + 1}</span></td>
      <td>${x.name}（${x.code}）</td>
      <td>${f(x.price)}</td>
      <td><b>${x.score}</b></td>
      <td class="pos">${f(x.avg3FcfYield, '%')}</td>
      <td>${f(x.pe)}</td>
      <td>${f(x.pb)}</td>
      <td class="pos">${f(x.divYield, '%')}</td>
    </tr>
    <tr class="bc-detail" id="detail${i}" style="display:none"><td colspan="8">
      因子排名（越小越好）：自由現金流報酬率 #${x.rankFcf}・本益比 #${x.rankPe}・股價淨值比 #${x.rankPb}・殖利率 #${x.rankDy}　→　綜合 ${x.score}
      ｜ <a href="/predict" style="color:var(--accent)">AI 預測</a>
      ${mkt === 'tw' ? `・<a href="/tw" style="color:var(--accent)">台股分析</a>` : `・<a href="/" style="color:var(--accent)">美股分析</a>`}
    </td></tr>`).join('');
  document.getElementById('result').innerHTML = `
    <div class="bc-meta">共入選 ${st.matched} 檔，依綜合分數由小到大（越被低估越前面）。點列看因子排名。</div>
    <table class="bc-table">
      <thead><tr>
        <th>#</th><th>標的</th><th>現價</th><th>綜合分數</th>
        <th>3年FCF報酬率</th><th>本益比</th><th>股價淨值比</th><th>殖利率</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function toggleDetail(i) {
  const el = document.getElementById('detail' + i);
  if (el) el.style.display = el.style.display === 'none' ? 'table-row' : 'none';
}
</script>
</body>
</html>
